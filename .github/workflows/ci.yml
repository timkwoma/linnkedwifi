name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
        env:
          PYTHONPATH: .
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: linkedwifi
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d linkedwifi"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install backend dependencies
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install ruff pytest-cov

      - name: Wait for services
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -U postgres -d linkedwifi && redis-cli ping && break || true
            sleep 2
          done

      - name: Run migrations and seed DB
        run: |
          . .venv/bin/activate
          export DATABASE_URL=postgresql+psycopg://postgres:postgres@localhost:5432/linkedwifi
          export REDIS_URL=redis://localhost:6379/0
          alembic upgrade head
          python -m linkedwifi_saas.seed

      - name: Backend lint (ruff)
        run: |
          . .venv/bin/activate
          ruff check backend linkedwifi_saas tests || true

      - name: Run backend tests, collect coverage, and capture logs
        working-directory: backend
        run: |
          . .venv/bin/activate
          mkdir -p reports
          # run pytest, write full terminal output to reports/pytest.log while preserving exit code
          pytest -q --maxfail=1 --disable-warnings --cov=linkedwifi_saas --cov-report=xml:reports/coverage.xml --cov-report=html:reports/coverage_html --junitxml=reports/junit.xml 2>&1 | tee reports/pytest.log; exit ${PIPESTATUS[0]}

      - name: Upload coverage XML
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-xml
          retention-days: 7
          path: backend/reports/coverage.xml

      - name: Upload coverage HTML
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-html
          retention-days: 7
          path: backend/reports/coverage_html

      - name: Upload pytest JUnit XML
        uses: actions/upload-artifact@v4
        with:
          name: backend-junit
          retention-days: 7
          path: backend/reports/junit.xml

      - name: Upload pytest raw log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-pytest-log
          retention-days: 7
          path: backend/reports/pytest.log

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
          MINIMUM_GREEN: 80
          MINIMUM_ORANGE: 60

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./backend/reports/coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false
          verbose: true

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test:coverage

      - name: Upload frontend coverage XML
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-xml
          retention-days: 7
          path: frontend/coverage/coverage-final.json

      - name: Upload frontend coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./frontend/coverage/coverage-final.json
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false
          verbose: true

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install and build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
