name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
        env:
          PYTHONPATH: .
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: linkedwifi
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d linkedwifi"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install backend dependencies
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install ruff pytest-cov

      - name: Wait for services
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -U postgres -d linkedwifi && redis-cli ping && break || true
            sleep 2
          done

      - name: Run migrations and seed DB
        run: |
          . .venv/bin/activate
          export DATABASE_URL=postgresql+psycopg://postgres:postgres@localhost:5432/linkedwifi
          export REDIS_URL=redis://localhost:6379/0
          alembic upgrade head
          python -m linkedwifi_saas.seed

      - name: Backend lint (ruff)
        run: |
          . .venv/bin/activate
          ruff check backend linkedwifi_saas tests || true

      - name: Run backend tests and collect coverage
        working-directory: backend
        run: |
          . .venv/bin/activate
          mkdir -p reports
          pytest -q --maxfail=1 --disable-warnings --cov=linkedwifi_saas --cov-report=xml:coverage.xml --junitxml=reports/junit.xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

      - name: Upload pytest JUnit XML
        uses: actions/upload-artifact@v4
        with:
          name: backend-junit
          path: backend/reports/junit.xml

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install and lint frontend
        working-directory: frontend
        run: |
          npm ci
          npm run lint

      - name: Build frontend
        working-directory: frontend
        run: |
          npm run build
