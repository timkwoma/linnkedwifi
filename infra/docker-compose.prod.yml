version: "3.9"

services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: linkedwifi
      POSTGRES_USER: linkedwifi
      POSTGRES_PASSWORD: change-me
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linkedwifi -d linkedwifi"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
    restart: unless-stopped
    command: gunicorn -w 4 -k uvicorn.workers.UvicornWorker linkedwifi_saas.main:app -b 0.0.0.0:8000
    env_file:
      - ../backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=5).getcode()==200 else 1)",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ../frontend
    restart: unless-stopped
    env_file:
      - ../frontend/.env.local
    command: npm run start
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  redis_data:
